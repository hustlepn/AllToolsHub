<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="iiPL9pu3aX8WU4hBfdL1BYZYWmMLqk3RVglN-2aGd2Q" />
    <title>AllToolsHub - {% block title %}{% endblock %}</title>
    
    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="192x192" href="/static/images/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/static/images/icon-512.png">
    <link rel="icon" type="image/png" href="/static/images/favicon.png">
    <link rel="manifest" href="/static/site.webmanifest">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-container">
                <a href="/" class="logo">
                    <img src="/static/images/icon-192.png" alt="AllToolsHub Logo">
                    AllToolsHub
                </a>
                
                <button class="menu-toggle" aria-label="Menu">
                    <i class="fas fa-bars"></i>
                </button>
                
                <div class="nav-links">
                    <a href="/"><i class="fas fa-home"></i> Home</a>
                    <a href="/blog"><i class="fas fa-newspaper"></i> Blog</a>
                    <a href="/downloader"><i class="fas fa-download"></i> Downloader</a>
                    <a href="/urlshortener"><i class="fas fa-link"></i> URL Shortener</a>
                    <a href="/calculators"><i class="fas fa-calculator"></i> Calculators</a>
                    <!-- About link removed from here -->
                </div>
            </div>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="footer-links">
            <a href="/privacy">Privacy Policy</a> | 
            <a href="/terms">Terms of Service</a> | 
            <a href="/about">About Us</a> |  <!-- Moved to footer -->
            <a href="/contact">Contact</a>
        </div>
        <p>&copy; 2023 AllToolsHub | Made with ❤️ for you</p>
    </footer>

    <script>
        // Mobile menu toggle
        document.querySelector('.menu-toggle').addEventListener('click', function() {
            document.querySelector('.nav-links').classList.toggle('active');
        });
        
        // Close menu when clicking a link
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                document.querySelector('.nav-links').classList.remove('active');
            });
        });
    </script>
</body>
</html>
