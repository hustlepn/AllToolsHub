{% extends "base.html" %}

{% block title %}Contact Us - AllToolsHub{% endblock %}

{% block content %}
<div class="page-content">
    <h1>Contact AllToolsHub</h1>
    
    <div class="contact-container">
        <section class="contact-form">
            <h2>Send Us a Message</h2>
            <form action="/submit-contact" method="POST">
                <div class="form-group">
                    <label for="name">Your Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </section>
        
        <section class="contact-info">
            <h2>Other Ways to Reach Us</h2>
            <p><i class="fas fa-envelope"></i> Email: <a href="mailto:support@alltoolshub.com">support@alltoolshub.com</a></p>
            <p><i class="fas fa-map-marker-alt"></i> Address: 123 Tool Street, Internet City</p>
            <p><i class="fas fa-clock"></i> Support Hours: Mon-Fri, 9AM-5PM GMT</p>
        </section>
    </div>
</div>
{% endblock %}
